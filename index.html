<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实用导航站</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 图标 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    html {
      scroll-behavior: smooth;
    }
    .nav-link {
      cursor: pointer;
    }
    .card {
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">实用导航站</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#movie">在线影视</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#game">游戏资源</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#web">常用网站</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 头部 -->
<header class="bg-light text-center py-5 pt-6 mt-5">
  <div class="container">
    <h1 class="display-6 fw-bold">实用网址导航</h1>
    <p class="text-muted">一站式聚合 影视、游戏、常用工具</p>
  </div>
</header>

<!-- 在线影视 -->
<section id="movie" class="py-5">
  <div class="container">
    <h3 class="mb-4 border-start border-primary border-4 ps-2">
      <i class="bi-film"></i> 在线影视
    </h3>
    <div class="row g-3">
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-play-btn display-6 text-primary"></i>
            <h6 class="mt-2">影视大全</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-tv display-6 text-danger"></i>
            <h6 class="mt-2">追剧网</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-camera-reels display-6 text-success"></i>
            <h6 class="mt-2">电影天堂</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-display display-6 text-warning"></i>
            <h6 class="mt-2">动漫影视</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- 游戏资源 -->
<section id="game" class="py-5 bg-light">
  <div class="container">
    <h3 class="mb-4 border-start border-primary border-4 ps-2">
      <i class="bi-controller"></i> 游戏资源
    </h3>
    <div class="row g-3">
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-joystick display-6 text-primary"></i>
            <h6 class="mt-2">单机游戏</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-pc-display display-6 text-info"></i>
            <h6 class="mt-2">Steam 相关</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">

          <div class="card-body">

            <h6 class="mt-2">游戏下载</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="web" class="py-5">
  <div class="container">
    <h3 class="mb-4 border-start border-primary border-4 ps-2">
      <i class="bi-globe"></i> 常用网站
    </h3>
    <div class="row g-3">
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-search display-6 text-primary"></i>
            <h6 class="mt-2">搜索引擎</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-cloud-arrow-down display-6 text-info"></i>
            <h6 class="mt-2">网盘搜索</h6>
            <a href="#" class="stretched-link" target="_blank"></a>
          </div>

      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <i class="bi-tools display-6 text-success"></i>
            <h6 class="mt-2">在线工具</h6>

          <div class="card-body">

            <a href="#" class="stretched-link" target="_blank"></a>

<!-- 底部 -->
<footer class="bg-dark text-white text-center py-3">
  <div class="container">
    <small>实用导航站 &copy; 2025</small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
